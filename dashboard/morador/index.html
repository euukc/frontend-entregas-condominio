<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Morador - Sistema de Entregas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #111827;
        }
    </style>
</head>
<body>
    <div class="min-h-screen text-gray-900">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-indigo-600 text-white shadow-sm">
                        <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor">
                            <path stroke-width="1.5" d="M3 7.5 12 3l9 4.5M3 7.5 12 12m0-9 9 4.5M3 7.5v9L12 21m0-9v9m9-13.5v9L12 21" />
                        </svg>
                    </span>
                    <h1 class="text-2xl font-bold">Painel do Morador</h1>
                </div>
                <a href="../../index.html" class="px-4 py-2 rounded-xl border border-gray-300 hover:bg-gray-50 transition">Sair</a>
            </div>
            <div class="mt-8">
                <h2 class="text-xl font-semibold mb-4">Minhas Entregas</h2>
                <div class="grid gap-4">
                    
                    <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-semibold">Pacote da Amazon</h3>
                                <p class="text-sm text-gray-600">Recebido em: 2024-03-09</p>
                                <p class="text-sm text-gray-600">Apartamento: 101</p>
                            </div>
                            <button class="px-4 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700 transition" onclick="confirmarEntrega(this)">Confirmar Recebimento</button>
                        </div>
                    </div>
                    <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-semibold">Carta Oficial</h3>
                                <p class="text-sm text-gray-600">Recebido em: 2024-03-08</p>
                                <p class="text-sm text-gray-600">Apartamento: 101</p>
                            </div>
                            <button class="px-4 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700 transition" onclick="confirmarEntrega(this)">Confirmar Recebimento</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function confirmarEntrega(button) {
            button.textContent = 'Confirmado';
            button.disabled = true;
            button.classList.remove('bg-green-600', 'hover:bg-green-700');
            button.classList.add('bg-gray-400');
        }
    </script>
</body>
</html>
